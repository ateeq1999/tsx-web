name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck registry-web
        working-directory: apps/registry-web
        run: bun run typecheck

      - name: Build registry-web (vercel preset)
        working-directory: apps/registry-web
        run: bun run build
        env:
          NITRO_PRESET: vercel

      - name: Build docs (vercel preset)
        working-directory: apps/docs
        run: bun run build
        env:
          NITRO_PRESET: vercel

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Vercel CLI
        run: bun add -g vercel

      - name: Install dependencies
        run: bun install

      - name: Build registry-web (vercel preset)
        working-directory: apps/registry-web
        run: bun run build
        env:
          NITRO_PRESET: vercel

      - name: Deploy registry-web
        working-directory: apps/registry-web
        run: |
          vercel deploy --prebuilt \
            --scope ateeq1999s-projects \
            --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_REGISTRY_WEB_PROJECT_ID }}

      - name: Build docs (vercel preset)
        working-directory: apps/docs
        run: bun run build
        env:
          NITRO_PRESET: vercel

      - name: Deploy docs
        working-directory: apps/docs
        run: |
          vercel deploy --prebuilt \
            --scope ateeq1999s-projects \
            --prod --yes \
            --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}
